<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Navion Home</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; font-family: Segoe UI, Arial, sans-serif; background: #0f1220; color: #d7defe; }
    .nv-wrap { min-height: 100%; display: grid; place-items: center; padding: 20px; }
    .nv-card { width: min(680px, 100%); background: #1a1f36; border: 1px solid #2b3358; border-radius: 14px; padding: 22px; text-align: center; }
    .nv-brand { font-weight: 800; letter-spacing: 1px; color: #b8c4ff; font-size: 22px; margin-bottom: 10px; }
    .nv-title { margin: 0 0 8px; font-size: 30px; }
    .nv-muted { color: #b8c4ff; margin: 0; line-height: 1.55; }
    .nv-credits { margin-top: 10px; color: #9fb0ff; font-size: 13px; }
    .nv-actions { margin-top: 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .nv-btn { text-decoration: none; border: 1px solid #5664aa; background: #4b5cb8; color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
    .nv-links { margin-top: 12px; font-size: 13px; color: #9fb0ff; }
    .nv-links a { color: #9fb0ff; text-decoration: none; }
    .nv-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="nv-wrap">
    <div class="nv-card">
      <div class="nv-brand">Navion</div>
      <h1 class="nv-title">Home</h1>
      <p class="nv-muted">Enter a URL or search from the top bar.</p>
      <p class="nv-credits">Company: Navine · Lead Dev: HitBoyXx23</p>
      <div class="nv-actions">
        <a class="nv-btn" href="/nv/aHR0cHMlM0ElMkYlMkZ3d3cueW91dHViZS5jb20" data-navion-open>Open YouTube</a>
        <a class="nv-btn" href="/nv/aHR0cHMlM0ElMkYlMkZkdWNrZHVja2dvLmNvbQ" data-navion-open>Open DuckDuckGo</a>
      </div>
      <div class="nv-links">
        <a href="https://github.com/NavineDevs/Navion" target="_blank" rel="noopener noreferrer">Core Repo</a>
        ·
        <a href="https://github.com/NavineDevs/Navion-App" target="_blank" rel="noopener noreferrer">App Repo</a>
      </div>
    </div>
  </div>
  <script>
    !function () {
      document.addEventListener("click", function (event) {
        var link = event.target && event.target.closest && event.target.closest("[data-navion-open]");
        if (!link) return;
        var href = link.getAttribute("href");
        if (!href) return;
        event.preventDefault();
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "navion-open-tab", url: href }, window.location.origin);
            return;
          }
        } catch (e) {}
        window.location.href = href;
      });
    }();
  </script>
</body>
</html>
