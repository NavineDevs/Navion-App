<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navion Browser</title>
  <script>
    if (window.top !== window) {

  <style>

    .nv-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #1a1f36;
      border-bottom: 1px solid #2b3358;
    }
    .nv-brand { font-weight: 700; letter-spacing: 1px; color: #b8c4ff; padding: 0 8px; }
    .nv-btn {
      border: 1px solid #3d4778;
      background: #222a49;
      color: #d7defe;
      border-radius: 8px;
      min-width: 34px;
      height: 34px;
      cursor: pointer;
    }
    .nv-btn:hover { background: #2b3560; }
    .nv-form { display: flex; flex: 1; gap: 8px; }
    .nv-input {
      flex: 1;
      height: 34px;
      border: 1px solid #3d4778;
      border-radius: 8px;
      background: #11172e;
      color: #fff;
      padding: 0 10px;
      outline: none;
    }
    .nv-input:focus { border-color: #7a8be0; }
    .nv-go {
      border: 1px solid #5664aa;
      background: #4b5cb8;
      color: #fff;
      border-radius: 8px;
      padding: 0 14px;
      height: 34px;
      cursor: pointer;
    }
    .nv-go:hover { background: #5a6bc8; }
    .nv-tabs {
      display: flex;
      align-items: stretch;
      gap: 6px;
      padding: 0 10px 10px;
      background: #1a1f36;
      border-bottom: 1px solid #2b3358;
      overflow-x: auto;
    }
    .nv-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #3d4778;
      background: #222a49;
      color: #d7defe;
      border-radius: 999px;
      padding: 0 12px;
      height: 30px;
      cursor: pointer;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .nv-tab-active { background: #4b5cb8; border-color: #6f81e6; }
    .nv-tab-close {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }
    .nv-tab-new {
      border: 1px solid #3d4778;
      background: #11172e;
      color: #d7defe;
      border-radius: 999px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .nv-tab-new:hover, .nv-tab:hover { background: #2b3560; }
    .nv-view { width: 100%; height: 100%; min-height: 0; border: 0; background: #fff; display: block; pointer-events: auto; }
  </style>
</head>
<body>

      <div class="nv-brand">Navion</div>

      <button class="nv-btn" id="nvReload" type="button">&#10227;</button>

        <datalist id="nvSuggestions"></datalist>
        <button class="nv-go" type="submit">Go</button>
      </form>
    </div>
    <div class="nv-tabs" id="nvTabs"></div>
    <iframe
      id="nvFrame"
      class="nv-view"
      allow="clipboard-read; clipboard-write; autoplay; fullscreen; encrypted-media; picture-in-picture"

  </div>

      function nvLoadState() {
        try {
          var raw = localStorage.getItem(NV_STATE_KEY);
          if (!raw) return false;
          var parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.tabs) || !parsed.tabs.length) return false;
          nvTabsState = parsed.tabs.filter(function (tab) {
            return tab && typeof tab.id === "string" && typeof tab.url === "string" && typeof tab.src === "string";
          }).map(function (tab) {
            return nvSanitizeTab({
              id: tab.id,
              url: tab.url,
              src: tab.src,
              label: typeof tab.label === "string" && tab.label ? tab.label : nvDisplayLabel(tab.url),
            });
          });
          if (!nvTabsState.length) return false;
          nvTabSeq = Number(parsed.seq) || nvTabsState.length;
          nvActiveTabId = parsed.activeTabId;
          if (!nvFindTab(nvActiveTabId)) nvActiveTabId = nvTabsState[0].id;
          var active = nvFindTab(nvActiveTabId);
          nvSanitizeTab(active);
          nvSetFrameSource(active.src);
          nvRenderTabs();
          nvSyncUi(active);
          return true;
        } catch (e) {
          return false;
        }
      }

      function nvSaveHistory() {
        try { localStorage.setItem(NV_HISTORY_KEY, JSON.stringify(nvHistoryItems)); } catch (e) {}
      }

      function nvRenderSuggestions() {
        if (!nvSuggestions) return;
        nvSuggestions.innerHTML = "";
        for (var i = 0; i < nvHistoryItems.length && i < 30; i++) {
          var option = document.createElement("option");
          option.value = nvHistoryItems[i];
          nvSuggestions.appendChild(option);
        }
      }

      function nvLoadHistory() {
        try {
          var raw = localStorage.getItem(NV_HISTORY_KEY);
          if (!raw) return;
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return;
          nvHistoryItems = parsed.filter(function (item) { return typeof item === "string" && item.trim(); }).slice(0, NV_HISTORY_MAX);
        } catch (e) {}
      }

      function nvTrackHistory(url) {
        if (typeof url !== "string") return;
        var trimmed = url.trim();
        if (!trimmed || trimmed === "nav://home") return;
        nvHistoryItems = nvHistoryItems.filter(function (item) { return item !== trimmed; });
        nvHistoryItems.unshift(trimmed);
        if (nvHistoryItems.length > NV_HISTORY_MAX) nvHistoryItems.length = NV_HISTORY_MAX;
        nvRenderSuggestions();
        nvSaveHistory();
      }

      function nvRenderTabs() {
        nvTabs.innerHTML = "";
        for (var i = 0; i < nvTabsState.length; i++) {
          (function (tab) {
            var btn = document.createElement("div");
            btn.className = "nv-tab" + (tab.id === nvActiveTabId ? " nv-tab-active" : "");
            btn.title = tab.url;
            btn.setAttribute("role", "button");
            btn.tabIndex = 0;
            btn.onclick = function (e) {
              if (e.target && e.target.className === "nv-tab-close") return;
              nvActivateTab(tab.id);
            };
            btn.onkeydown = function (e) {
              if (e.key === "Enter" || e.key === " ") nvActivateTab(tab.id);
            };
            var label = document.createElement("span");
            label.textContent = tab.label;
            btn.appendChild(label);
            var close = document.createElement("button");
            close.type = "button";
            close.className = "nv-tab-close";
            close.textContent = "x";
            close.onclick = function (e) {
              e.stopPropagation();
              nvCloseTab(tab.id);
            };
            btn.appendChild(close);
            nvTabs.appendChild(btn);
          })(nvTabsState[i]);
        }
        var add = document.createElement("button");
        add.type = "button";
        add.className = "nv-tab-new";
        add.textContent = "+";
        add.onclick = function () {
          nvCreateTab("nav://home", "/nav/home", true);
        };
        nvTabs.appendChild(add);
      }

      function nvSyncUi(tab) {
        if (!tab) return;
        if (!nvUrlEditing) nvUrl.value = tab.url;
        document.title = "Navion - " + tab.label;
      }

      function nvSetTabUrl(tab, url) {
        if (!tab || !url) return;
        tab.url = url;
        tab.label = nvDisplayLabel(url);
        nvTrackHistory(url);
      }

      function nvActivateTab(id, nextSrc, nextUrl) {
        var tab = nvFindTab(id);
        if (!tab) return;
        if (nextUrl) nvSetTabUrl(tab, nextUrl);
        nvActiveTabId = id;
        if (nextSrc) tab.src = nextSrc;
        nvSanitizeTab(tab);
        nvSetFrameSource(tab.src);
        nvSyncShellLocation(tab.src, tab.url);
        nvRenderTabs();
        nvSyncUi(tab);
        nvSaveState();
      }

      function nvCreateTab(url, src, activate) {
        var id = "nv_tab_" + (++nvTabSeq);
        var tab = {
          id: id,
          url: url,
          src: src || nvToProxy(url),
          label: nvDisplayLabel(url),
        };
        nvSanitizeTab(tab);
        nvTabsState.push(tab);
        if (activate !== false) nvActiveTabId = id;
        if (!nvInitialTabCreated) nvInitialTabCreated = true;
        if (activate !== false) nvSetFrameSource(tab.src);
        nvRenderTabs();
        nvSyncUi(tab);
        nvTrackHistory(url);
        nvSaveState();
        return tab;
      }

      function nvCloseTab(id) {
        var idx = -1;
        for (var i = 0; i < nvTabsState.length; i++) {
          if (nvTabsState[i].id === id) { idx = i; break; }
        }
        if (idx === -1) return;
        var wasActive = nvActiveTabId === id;
        nvTabsState.splice(idx, 1);
        if (!nvTabsState.length) {
          nvCreateTab("nav://home", "/nav/home", true);
          return;
        }
        if (wasActive) {
          var next = nvTabsState[Math.min(idx, nvTabsState.length - 1)];
          nvActiveTabId = next.id;
          nvSetFrameSource(next.src);
          nvSyncUi(next);
        }
        nvRenderTabs();
        nvSaveState();
      }

      function nvOpenRequestedTab(url) {
        if (typeof url !== "string" || !url.trim()) return;
        var raw = url.trim();
        var asPath = raw;
        try {
          var maybeAbsolute = new URL(raw, window.location.origin);
          if (maybeAbsolute.origin === window.location.origin) {
            asPath = maybeAbsolute.pathname + maybeAbsolute.search + maybeAbsolute.hash;
          }
        } catch (e) {}
        if (asPath.indexOf("/nv/") === 0) {
          var encodedPart = asPath.slice(4).split("?")[0].split("#")[0];
          var decoded = nvDecode(encodedPart);
          for (var i = 0; i < nvTabsState.length; i++) {
            if (nvTabsState[i] && nvTabsState[i].src === asPath) {
              nvActivateTab(nvTabsState[i].id);
              return;
            }
          }
          nvCreateTab(decoded || raw, asPath, true);
          return;
        }
        var n = nvNormalize(raw);
        if (!n) return;
        nvCreateTab(n, nvToProxy(n), true);
      }

      function nvConsumeOpenParam() {
        try {
          var params = new URLSearchParams(window.location.search || "");
          var open = params.get("open");
          if (!open) return false;
          history.replaceState({ nvProxy: open, nvUrl: nvDecodeProxyUrl(open) || "" }, "", "/app");
          nvOpenRequestedTab(open);
          return true;
        } catch (e) {
          return false;
        }
      }

      nvForm.onsubmit = function (e) {
        e.preventDefault();
        nvUrlEditing = false;
        if (!nvUrl.value || !nvUrl.value.trim()) return;
        nvOpen(nvUrl.value);
      };
      nvUrl.addEventListener("focus", function () { nvUrlEditing = true; });
      nvUrl.addEventListener("blur", function () { nvUrlEditing = false; });
      nvBackBtn.onclick = function () { try { nvFrame.contentWindow.history.back(); } catch (e) {} };
      nvForwardBtn.onclick = function () { try { nvFrame.contentWindow.history.forward(); } catch (e) {} };
      nvReloadBtn.onclick = function () { try { nvFrame.contentWindow.location.reload(); } catch (e) {} };
      window.addEventListener("message", function (event) {
        if (event.origin !== window.location.origin) return;
        var data = event.data || {};
        if (data.type === "navion-open-tab" && data.url) {
          nvOpenRequestedTab(data.url);
          return;
        }
        if (data.type === "navion-location" && nvActiveTabId && (data.url || data.proxyHref)) {
          var activeTab = nvFindTab(nvActiveTabId);
          if (!activeTab) return;
          var proxyDisplay = "";
          if (typeof data.proxyHref === "string") proxyDisplay = nvDecodeProxyUrl(data.proxyHref);
          var displayUrl = proxyDisplay || data.url || activeTab.url;
          if (nvIsShellUrl(displayUrl) || nvIsBrowserErrorUrl(displayUrl)) return;
          if (nvShouldBreakOutAuth(displayUrl)) {
            var authRaw = (typeof data.proxyHref === "string" && data.proxyHref) || displayUrl;
            if (nvOpenTopLevelProxy(authRaw, displayUrl)) return;
          }
          nvSetTabUrl(activeTab, displayUrl);
          if (data.proxyHref && typeof data.proxyHref === "string") {
            var proxiedSrc = nvNormalizeFrameSrc(data.proxyHref, displayUrl);
            if (proxiedSrc) {
              activeTab.src = proxiedSrc;
              nvSyncShellLocation(proxiedSrc, displayUrl);
            }
          }
          nvRenderTabs();
          nvSyncUi(activeTab);
          nvSaveState();
        }
      });
      setInterval(function () { nvGuardFrameNavigation(); }, 900);
      function nvHandleFrameLoad() {
        try {
          if (String(nvFrame.contentWindow.location.href || "") === "about:blank") return;
        } catch (blankError) {}
        var activeAtLoad = nvFindTab(nvActiveTabId);
        if (activeAtLoad) nvSyncTabFromProxySrc(activeAtLoad, String(nvFrame.getAttribute("src") || nvFrame.src || ""));
        var expectedSrc = String(nvFrame.getAttribute("src") || "");
        var expectedPath = "";
        try {
          expectedPath = new URL(expectedSrc, window.location.origin).pathname;
        } catch (e0) {
          expectedPath = expectedSrc.split("?")[0].split("#")[0];
        }
        try {
          var path = nvFrame.contentWindow.location.pathname || "";
          var search = nvFrame.contentWindow.location.search || "";
          var hash = nvFrame.contentWindow.location.hash || "";
          var currentUrl = nvFrame.contentWindow.location.href || "";
          if (path.startsWith("/nv/")) {
            var out = nvDecodeProxyUrl(currentUrl);
            var active = nvFindTab(nvActiveTabId);
            if (out && active) {
              active.url = out;
              active.label = nvDisplayLabel(out);
              active.src = path + search + hash;
              nvUrl.value = out;
              nvSyncShellLocation(active.src, out);
              nvRenderTabs();
              nvSyncUi(active);
              nvTrackHistory(out);
              nvSaveState();
            }
          }
          if (nvIsYouTubeBarePath(path)) {
            var activeYt = nvFindTab(nvActiveTabId);
            if (activeYt && nvRepairBareYouTubeNavigation(activeYt, path, search, hash)) return;
          }
          if ((path === "/nav/home" || path === "/nav/error") && (!expectedPath || expectedPath === path)) {
            var activeNav = nvFindTab(nvActiveTabId);
            if (activeNav) {
              activeNav.url = path === "/nav/home" ? "nav://home" : "nav://error";
              activeNav.label = nvDisplayLabel(activeNav.url);
              if (!nvUrlEditing) nvUrl.value = activeNav.url;
              nvRenderTabs();
              nvSyncUi(activeNav);
              nvSaveState();
            }
          }
          if (currentUrl && nvActiveTabId) {
            var tab = nvFindTab(nvActiveTabId);
            if (tab && nvIsShellUrl(currentUrl)) {
              if (tab.src && tab.src.indexOf("/nv/") === 0 && nvFrame.getAttribute("src") !== tab.src) {
                nvSetFrameSource(tab.src);
              }
              return;
            }
            if (tab && nvIsBrowserErrorUrl(currentUrl)) return;
            if (tab && expectedPath && expectedPath.indexOf("/nv/") === 0 && !path.startsWith("/nv/") && !nvIsLocalPath(path)) {
              try {
                var maskedUrl = new URL(path + search + hash, tab.url).href;
                var maskedProxy = nvYoutubeProxySrc(maskedUrl);
                tab.url = maskedUrl;
                tab.label = nvDisplayLabel(maskedUrl);
                tab.src = maskedProxy;
                if (!nvUrlEditing) nvUrl.value = maskedUrl;
                nvSyncShellLocation(maskedProxy, maskedUrl);
                nvSetFrameSource(maskedProxy);
                nvRenderTabs();
                nvSyncUi(tab);
                nvTrackHistory(maskedUrl);
                nvSaveState();
                return;
              } catch (maskedError) {}
            }
            if (tab && !nvProxyTargetsMatch(currentUrl, tab.src)) {
              var normalizedSrc = nvNormalizeFrameSrc(currentUrl, tab.url);
              if (normalizedSrc) {
                tab.src = normalizedSrc;
                if (!nvIsLocalPath(path) && !nvIsYouTubeBarePath(path) && !(expectedPath && expectedPath.indexOf("/nv/") === 0)) {
                  var frameAttr = String(nvFrame.getAttribute("src") || "");
                  if (!nvProxyTargetsMatch(frameAttr, normalizedSrc)) {
                    nvSetFrameSource(normalizedSrc);
                    nvSaveState();
                    return;
                  }
                }
              }
            }
            if (tab && !path.startsWith("/nv/") && !nvIsLocalPath(path)) {
              try {
                var inferred = new URL(path + search + hash, tab.url).href;
                tab.url = inferred;
                tab.label = nvDisplayLabel(inferred);
                nvUrl.value = inferred;
                nvRenderTabs();
                nvSyncUi(tab);
                nvTrackHistory(inferred);
                nvSaveState();
              } catch (e2) {}
            }
          }
        } catch (e) {
          var crossTab = nvFindTab(nvActiveTabId);
          if (!crossTab) return;
          nvSyncTabFromProxySrc(crossTab, String(nvFrame.getAttribute("src") || nvFrame.src || ""));
          if (crossTab.url && nvShouldBreakOutAuth(crossTab.url)) {
            nvOpenTopLevelProxy(crossTab.src || crossTab.url, crossTab.url);
            return;
          }
          var restoreSrc = nvNormalizeFrameSrc(crossTab.src || "", crossTab.url);
          if (restoreSrc && nvFrame.getAttribute("src") !== restoreSrc) {
            nvSetFrameSource(restoreSrc);
            nvSaveState();
          }
        }
      }
      nvFrame.addEventListener("load", nvHandleFrameLoad);
      nvLoadHistory();
      nvRenderSuggestions();
      if (!nvConsumeOpenParam() && !nvLoadState()) nvCreateTab("nav://home", "/nav/home", true);
    }();
  </script>
</body>
</html>
